<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a56db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0e3fa3;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" rx="0"/>
  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="200" fill="white" fill-opacity="0.04"/>
  <circle cx="150" cy="530" r="180" fill="white" fill-opacity="0.04"/>
  <!-- Logo dot -->
  <circle cx="562" cy="225" r="14" fill="#10b981"/>
  <!-- CalcFi text -->
  <text x="600" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="96" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-2">CalcFi</text>
  <!-- Subtitle -->
  <text x="600" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="400" fill="white" fill-opacity="0.85" text-anchor="middle">Free Financial Calculators</text>
  <!-- Tag line -->
  <text x="600" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" fill="white" fill-opacity="0.55" text-anchor="middle">FIRE · Savings · Mortgage · Crypto · Net Worth</text>
  <!-- URL -->
  <text x="600" y="560" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="500" fill="white" fill-opacity="0.45" text-anchor="middle">calcfi.io</text>
</svg>
